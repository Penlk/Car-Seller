apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    jsonData:
      lokiSearch:
        datasourceUid: loki
      traceToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    jsonData:
      exemplarTraceIdDestinations:
        - datasourceUid: Tempo
          name: Tempo
          url: '$${__data.json.spanID}'

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
