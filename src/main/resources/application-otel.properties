# OpenTelemetry Configuration

# Enable all auto-instrumentation
otel.instrumentation.common.default-enabled=true

# Trace context propagation
otel.propagators=tracecontext,jaeger

# Metrics export
otel.metrics.exporter=otlp

# Trace export
otel.traces.exporter=otlp

# OTLP Protocol (http/protobuf by default)
otel.exporter.otlp.protocol=http/protobuf

# Kafka instrumentation
otel.instrumentation.kafka.enabled=true
otel.instrumentation.kafka.client.enabled=true

# gRPC instrumentation
otel.instrumentation.grpc.enabled=true

# HTTP instrumentation
otel.instrumentation.spring-web.enabled=true
otel.instrumentation.spring-webmvc.enabled=true

# Database instrumentation
otel.instrumentation.jdbc.enabled=true

# Scheduler instrumentation
otel.instrumentation.scheduled-executor-service.enabled=true

# Resource attributes
otel.resource.attributes=service.name=order,service.version=1.0,deployment.environment=development

# Sampling
otel.traces.sampler=always_on
otel.traces.sampler.arg=1.0

# Logging exporter
otel.logs.exporter=logging
