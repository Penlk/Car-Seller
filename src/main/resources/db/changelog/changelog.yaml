                    primaryKeyName: pk_special_allowed_parts
              - column:
                  name: car_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_special_allowed_parts_car
                    referencedTableName: cars
                    referencedColumnNames: id
              - column:
                  name: car_part_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_special_allowed_parts_car_part
                    referencedTableName: car_parts
                    referencedColumnNames: id
              - column:
                  name: price
                  type: MONEY
                  constraints:
                    nullable: false
        - createTable:
            tableName: special_configurations
            columns:
              - column:
                  name: configurator_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_special_configurations_configurator
                    referencedTableName: configurators
                    referencedColumnNames: id
              - column:
                  name: special_allowed_part_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_special_configurations_allowed_part
                    referencedTableName: special_allowed_parts
                    referencedColumnNames: id

        - addPrimaryKey:
            tableName: special_configurations
            columnNames: configurator_id, special_allowed_part_id
            constraintName: pk_special_configurations

        - createTable:
            tableName: configuration_car_parts
