services:
  db:
    image: postgres:16
    container_name: db
    env_file:
      - .env
    working_dir: /app
    environment:
      - PGDATA=/app/data
    volumes:
      - data:/app/data
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h localhost -p 5432"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
  migration:
    build:
      context: .
      dockerfile: docker/Dockerfile.migration
    image: java_migration
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy 

volumes:
  data: